name: "stainwarpy"
description: Register H&E stained and Multiplexed tissue images using feature-based image registration
keywords:
  - image registration
  - histology
  - hne
  - multiplexed
tools:
  - "stainwarpy":
      description: "Register H&E stained and Multiplexed tissue images using feature-based image registration"
      homepage: "https://github.com/tckumarasekara/stainwarpy"
      documentation: "https://github.com/tckumarasekara/stainwarpy"
      tool_dev_url: "https://github.com/tckumarasekara/stainwarpy"
      licence: ["MIT License", "Apache-2.0"]
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - hne_img:
        type: file
        description: H&E stained image file
        pattern: "*.{ome.tif,ome.tiff,tif,tiff}"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - multiplx_img:
        type: file
        description: Multiplexed image file
        pattern: "*.{ome.tif,ome.tiff,tif,tiff}"
        ontologies: []
  - - meta3:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - seg_mask:
        type: file
        description: Segmentation mask file
        pattern: "*.{ome.tif,ome.tiff,tif,tiff,npy}"
        ontologies: []

output:
  reg_image:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "0_final_channel_image.ome.tif":
          type: file
          description: Registered final channel image in OME-TIFF format
          pattern: "0_final_channel_image.ome.tif"
          ontologies: []
  reg_metrics_tform:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "registration_metrics_tform_map.json":
          type: file
          description: Registration metrics and transformation map in JSON format
          pattern: "registration_metrics_tform_map.json"
          ontologies: []
  transformed_segmentation_mask:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "transformed_segmentation_mask.ome.tif":
          type: file
          description: Transformed segmentation mask in OME-TIFF format
          pattern: "transformed_segmentation_mask.ome.tif"
          ontologies: []
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML

authors:
  - "@tckumarasekara"
maintainers:
  - "@tckumarasekara"
